edition: 3.0.0
name: makers-qwen-showrunner
access: default

vars:
  region: ap-southeast-1
  serviceName: makers-qwen-backend
  functionName: api

resources:
  makersBackend:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.functionName}
      description: Qwen-first backend orchestrator for Makers AI Showrunner
      runtime: custom.debian10
      code: ./dist
      handler: index.handler
      timeout: 300
      memorySize: 2048
      cpu: 1
      diskSize: 512
      instanceConcurrency: 10
      environmentVariables:
        NODE_ENV: production
        DEMO_MODE: "true"
        MAX_SCENES: "8"
        MAX_PARALLEL_VIDEO_JOBS: "3"
        MAX_VIDEO_SECONDS_PER_PROJECT: "35"
        QWEN_REGION: ap-southeast-1
        QWEN_SCRIPT_MODEL: qwen3.7-max
        QWEN_FAST_MODEL: qwen-plus
        QWEN_IMAGE_MODEL: qwen-image-2.0
        QWEN_VIDEO_MODEL: wan2.6-i2v-flash
        QWEN_IMAGE_TO_VIDEO_MODEL: wan2.6-i2v-flash
        QWEN_LONGFORM_VIDEO_MODEL: wan2.6-i2v-flash
        QWEN_LONGFORM_VIDEO_FALLBACK_MODEL: wan2.6-i2v
        QWEN_VIDEO_RESOLUTION: 720P
        QWEN_TTS_MODEL: qwen3-tts-flash
        SARVAM_API_KEY: ""
        SARVAM_TTS_MODEL: bulbul:v3
        SARVAM_TTS_SPEAKER: meera
        PLAYWRIGHT_ENABLED: "true"
